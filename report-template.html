<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Azure Analyzer Report</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f9fb;
            --panel: #ffffff;
            --text: #1b1b1f;
            --muted: #5a5a66;
            --accent: #2563eb;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --critical: #7f1d1d;
            --info: #64748b;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.45;
        }
        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
        }
        header h1 { margin: 0; font-size: 1.5rem; }
        header p { margin: .3rem 0 0; color: var(--muted); }

        main { padding: 1rem 1.25rem 2rem; display: grid; gap: 1rem; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 1rem;
            align-items: start;
        }
        .donut {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: .25rem auto;
            background: conic-gradient(var(--success) var(--compliance, 0%), var(--danger) 0);
            display: grid;
            place-items: center;
        }
        .donut > span {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: .75rem;
        }
        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .6rem .7rem;
            background: #f8fafc;
        }
        .card h3 { margin: 0; font-size: .75rem; text-transform: uppercase; color: var(--muted); }
        .card .value { margin-top: .3rem; font-size: 1.3rem; font-weight: 700; }

        .source-bars { display: grid; gap: .6rem; margin-top: .6rem; }
        .source-bar { display: grid; grid-template-columns: 140px 1fr 40px; gap: .6rem; align-items: center; }
        .bar-track { background: var(--border); border-radius: 999px; height: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: .6rem;
            margin-bottom: .75rem;
        }
        .controls label { font-size: .8rem; color: var(--muted); display: grid; gap: .3rem; }
        .controls select {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            color: var(--text);
            padding: .4rem .5rem;
        }

        .framework-chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .75rem; }
        .chip {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel);
            color: var(--text);
            padding: .25rem .55rem;
            cursor: pointer;
        }
        .chip.is-active { background: var(--accent); border-color: var(--accent); color: #fff; }

        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: .55rem; border-bottom: 1px solid var(--border); vertical-align: top; }
        th { font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; background: #f1f5f9; }
        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: .08rem .45rem;
            font-size: .72rem;
            font-weight: 700;
            color: #fff;
        }
        .sev-critical { background: var(--critical); }
        .sev-high { background: var(--danger); }
        .sev-medium { background: var(--warning); color: #111827; }
        .sev-low { background: #facc15; color: #111827; }
        .sev-info { background: var(--info); }
        .cmp-ok { background: var(--success); }
        .cmp-bad { background: var(--danger); }
        .delta-new { background: #2563eb; }
        .delta-resolved { background: #0f766e; }
        .delta-unchanged { background: #6b7280; }

        tbody tr:nth-child(even) td { background: #fbfdff; }
        tbody tr { break-inside: avoid; page-break-inside: avoid; }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .no-js-only { display: block; }
        .js-only { display: none; }
        body.js-enabled .no-js-only { display: none; }
        body.js-enabled .js-only { display: block; }

        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: 1fr; }
        }

        @media print {
            body { background: #fff; }
            .controls, .framework-chips, .no-print { display: none !important; }
            main { padding: .25rem; grid-template-columns: 1fr; }
            .panel { box-shadow: none; }
            .summary-grid { grid-template-columns: 1fr; }
            .card, table, details, tr { break-inside: avoid; page-break-inside: avoid; }
        }
    </style>
</head>
<body>
<header>
    <h1>Azure Analyzer Report</h1>
    <p id="report-subtitle">Offline report</p>
</header>

<main>
    <section class="panel">
        <div class="summary-grid">
            <div>
                <div class="donut" id="compliance-donut" aria-label="Compliance donut chart">
                    <span id="compliance-label">0%</span>
                </div>
            </div>
            <div>
                <div class="cards" id="summary-cards"></div>
                <h2 style="margin: .9rem 0 .4rem; font-size: 1rem;">Delta vs previous run</h2>
                <div class="cards" id="delta-cards"></div>
                <div class="source-bars" id="source-bars" aria-label="Per-source findings bars"></div>
            </div>
        </div>
    </section>

    <section class="panel no-print">
        <h2 style="margin-top: 0; font-size: 1rem;">Tool coverage</h2>
        <div id="tool-status"></div>
    </section>

    <section class="panel js-only" aria-label="Interactive findings dashboard">
        <h2 style="margin-top: 0; font-size: 1rem;">Findings</h2>
        <div class="controls" aria-label="Finding filters">
            <label>Source
                <select id="filter-source"><option value="">All</option></select>
            </label>
            <label>Severity
                <select id="filter-severity"><option value="">All</option></select>
            </label>
            <label>Category
                <select id="filter-category"><option value="">All</option></select>
            </label>
            <label>Compliance
                <select id="filter-compliance">
                    <option value="">All</option>
                    <option value="noncompliant">Non-compliant</option>
                    <option value="compliant">Compliant</option>
                </select>
            </label>
            <label>Delta
                <select id="filter-delta">
                    <option value="">All</option>
                    <option value="New">New</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Unchanged">Unchanged</option>
                </select>
            </label>
        </div>
        <div class="framework-chips" id="framework-chips" aria-label="Framework filter"></div>
        <table id="findings-table" aria-describedby="filter-help">
            <caption class="sr-only">Filtered findings list</caption>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Source</th>
                    <th>Severity</th>
                    <th>Compliance</th>
                    <th>Delta</th>
                    <th>Category</th>
                    <th>Frameworks</th>
                    <th>Resource</th>
                </tr>
            </thead>
            <tbody id="findings-body"></tbody>
        </table>
        <p id="filter-help" class="no-print" style="color: var(--muted); margin-top: .6rem;">Filters are combinable and synced to URL query parameters for sharing.</p>
    </section>

    <section class="panel no-js-only" id="static-report">
        {{STATIC_REPORT}}
    </section>
</main>

<!-- IMPORTANT: Generator MUST escape </ to <\/ in JSON before inserting here -->
<script type="application/json" id="report-data">{{MODEL_JSON}}</script>
<script>
(() => {
    document.body.classList.add('js-enabled');

    const dataElement = document.getElementById('report-data');
    let model = {};
    try {
        model = JSON.parse(dataElement ? dataElement.textContent : '{}');
    } catch {
        model = {};
    }

    const findings = Array.isArray(model.findings) ? model.findings : [];
    const safe = (v) => v === null || v === undefined ? '' : String(v);

    const summary = model.summary || {};
    const delta = model.delta || {};

    const subtitle = document.getElementById('report-subtitle');
    if (subtitle) {
        subtitle.textContent = model.generatedAt ? `Generated ${model.generatedAt}` : 'Offline report';
    }

    const summaryCards = [
        ['Total Findings', summary.totalFindings || 0],
        ['Non-Compliant', summary.nonCompliant || 0],
        ['Compliant', summary.compliant || 0],
        ['High/Critical', (summary.highSeverity || 0)],
        ['Medium', summary.mediumSeverity || 0],
        ['Low', summary.lowSeverity || 0]
    ];

    const summaryEl = document.getElementById('summary-cards');
    summaryCards.forEach(([label, value]) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${safe(label)}</h3><div class="value">${safe(value)}</div>`;
        summaryEl.appendChild(card);
    });

    const deltaEl = document.getElementById('delta-cards');
    const deltaCards = [
        ['New', delta.newCount || 0],
        ['Resolved', delta.resolvedCount || 0],
        ['Unchanged', delta.unchangedCount || 0],
        ['Net non-compliant', delta.netNonCompliantChange || 0]
    ];
    deltaCards.forEach(([label, value]) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<h3>${safe(label)}</h3><div class="value">${safe(value)}</div>`;
        deltaEl.appendChild(card);
    });

    const compliancePct = Number(summary.compliancePct || 0);
    const donut = document.getElementById('compliance-donut');
    const donutLabel = document.getElementById('compliance-label');
    if (donut && donutLabel) {
        donut.style.setProperty('--compliance', `${compliancePct}%`);
        donutLabel.textContent = `${compliancePct}%`;
    }

    const sourceBars = document.getElementById('source-bars');
    (Array.isArray(model.sourceBreakdown) ? model.sourceBreakdown : []).forEach((item) => {
        const row = document.createElement('div');
        row.className = 'source-bar';
        row.innerHTML = `
            <div>${safe(item.Name || item.name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Number(item.Width || item.width || 0)}%"></div></div>
            <div>${safe(item.Count || item.count || 0)}</div>
        `;
        sourceBars.appendChild(row);
    });

    const toolStatus = document.getElementById('tool-status');
    const statusItems = Array.isArray(model.toolStatus) ? model.toolStatus : [];
    if (statusItems.length === 0) {
        toolStatus.textContent = 'No tool status data available.';
    } else {
        const list = document.createElement('ul');
        list.style.margin = '0';
        list.style.paddingLeft = '1.2rem';
        statusItems.forEach((item) => {
            const li = document.createElement('li');
            li.textContent = `${safe(item.Tool || item.tool)}: ${safe(item.Status || item.status)}`;
            list.appendChild(li);
        });
        toolStatus.appendChild(list);
    }

    const sourceValues = Array.from(new Set(findings.map(f => safe(f.source)).filter(Boolean))).sort();
    const severityValues = Array.from(new Set(findings.map(f => safe(f.severity)).filter(Boolean))).sort();
    const categoryValues = Array.from(new Set(findings.map(f => safe(f.category)).filter(Boolean))).sort();

    function fillSelect(id, values) {
        const select = document.getElementById(id);
        values.forEach((v) => {
            const opt = document.createElement('option');
            opt.value = v;
            opt.textContent = v;
            select.appendChild(opt);
        });
    }

    fillSelect('filter-source', sourceValues);
    fillSelect('filter-severity', severityValues);
    fillSelect('filter-category', categoryValues);

    const frameworkChips = document.getElementById('framework-chips');
    let activeFramework = '';
    const frameworks = Array.isArray(model.frameworks) ? model.frameworks : [];

    const allChip = document.createElement('button');
    allChip.type = 'button';
    allChip.className = 'chip is-active';
    allChip.textContent = 'All frameworks';
    allChip.addEventListener('click', () => { activeFramework = ''; updateFiltersFromState(); applyFilters(); });
    frameworkChips.appendChild(allChip);

    frameworks.forEach((fw) => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = fw;
        chip.addEventListener('click', () => {
            activeFramework = fw;
            updateFiltersFromState();
            applyFilters();
        });
        frameworkChips.appendChild(chip);
    });

    const qs = new URLSearchParams(window.location.search);
    ['source','severity','category','compliance','delta'].forEach((name) => {
        const value = qs.get(name);
        const el = document.getElementById(`filter-${name}`);
        if (value && el) el.value = value;
    });
    activeFramework = qs.get('framework') || '';

    function setChipState() {
        Array.from(frameworkChips.querySelectorAll('.chip')).forEach((chip) => {
            const isAll = chip.textContent === 'All frameworks';
            chip.classList.toggle('is-active', (isAll && !activeFramework) || (!isAll && chip.textContent === activeFramework));
        });
    }

    function updateUrl() {
        const params = new URLSearchParams();
        ['source','severity','category','compliance','delta'].forEach((name) => {
            const value = document.getElementById(`filter-${name}`).value;
            if (value) params.set(name, value);
        });
        if (activeFramework) params.set('framework', activeFramework);
        const query = params.toString();
        const next = `${window.location.pathname}${query ? '?' + query : ''}`;
        window.history.replaceState({}, '', next);
    }

    function updateFiltersFromState() {
        setChipState();
        updateUrl();
    }

    function badge(text, cls) {
        return `<span class="badge ${cls}">${safe(text)}</span>`;
    }

    const body = document.getElementById('findings-body');
    function renderRows(rows) {
        body.textContent = '';
        if (!rows.length) {
            const tr = document.createElement('tr');
            const td = document.createElement('td');
            td.colSpan = 8;
            td.textContent = 'No findings match current filters.';
            tr.appendChild(td);
            body.appendChild(tr);
            return;
        }

        rows.forEach((f) => {
            const tr = document.createElement('tr');
            const frameworksText = Array.isArray(f.frameworks) ? f.frameworks.join(', ') : '';
            tr.innerHTML = `
                <td>${safe(f.title)}</td>
                <td>${safe(f.source)}</td>
                <td>${badge(safe(f.severity || 'Info'), `sev-${safe(f.severity || 'Info').toLowerCase()}`)}</td>
                <td>${badge(f.compliant ? 'Compliant' : 'Non-compliant', f.compliant ? 'cmp-ok' : 'cmp-bad')}</td>
                <td>${badge(safe(f.deltaStatus || 'Unchanged'), `delta-${safe((f.deltaStatus || 'Unchanged').toLowerCase())}`)}</td>
                <td>${safe(f.category)}</td>
                <td>${safe(frameworksText)}</td>
                <td>${safe(f.resourceId)}</td>
            `;
            body.appendChild(tr);
        });
    }

    function applyFilters() {
        const source = document.getElementById('filter-source').value;
        const severity = document.getElementById('filter-severity').value;
        const category = document.getElementById('filter-category').value;
        const compliance = document.getElementById('filter-compliance').value;
        const deltaFilter = document.getElementById('filter-delta').value;

        const filtered = findings.filter((f) => {
            if (source && safe(f.source) !== source) return false;
            if (severity && safe(f.severity) !== severity) return false;
            if (category && safe(f.category) !== category) return false;
            if (deltaFilter && safe(f.deltaStatus) !== deltaFilter) return false;
            if (compliance === 'compliant' && !f.compliant) return false;
            if (compliance === 'noncompliant' && f.compliant) return false;
            if (activeFramework) {
                const frameworks = Array.isArray(f.frameworks) ? f.frameworks : [];
                if (!frameworks.includes(activeFramework)) return false;
            }
            return true;
        });

        updateUrl();
        setChipState();
        renderRows(filtered);
    }

    ['source','severity','category','compliance','delta'].forEach((name) => {
        document.getElementById(`filter-${name}`).addEventListener('change', applyFilters);
    });

    setChipState();
    applyFilters();
})();
</script>
</body>
</html>
