# Example gitleaks config for Azure DevOps repository scans.
# These are examples only; review and tune for your environment.

[extend]
useDefault = true

[[allowlists]]
description = "Build artifact hash placeholders in pipeline variables"
regexTarget = "line"
regexes = [
  '''(?i)\b(artifactHash|buildHash)\s*[:=]\s*[a-f0-9]{40,64}\b'''
]

[[allowlists]]
description = "Managed identity object IDs referenced in IaC or pipeline templates"
regexTarget = "line"
regexes = [
  '''(?i)\bmanagedIdentity(ObjectId|PrincipalId)?\s*[:=]\s*[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\b'''
]

# Rationale:
# - Build artifact hashes are deterministic digests, not credentials.
# - Managed identity object IDs are identifiers, not secrets.
# Keep useDefault = true unless you provide a thoroughly reviewed replacement rule set.
