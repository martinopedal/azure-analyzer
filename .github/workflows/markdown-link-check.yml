name: Markdown Link Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**/*.md'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-link-check:
    name: markdown-link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install lychee CLI (pinned)
        env:
          LYCHEE_VERSION: v0.23.0
        run: |
          set -euo pipefail
          curl --retry 3 --retry-delay 5 -fsSL \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            -o /tmp/lychee.tgz
          mkdir -p /tmp/lychee && tar -xzf /tmp/lychee.tgz -C /tmp/lychee
          sudo install -m 0755 /tmp/lychee/lychee /usr/local/bin/lychee
          mkdir -p lychee
          lychee --version

      - name: Check markdown links (with retry on transient errors)
        id: lychee
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          command: |
            lychee --config .lychee.toml --format markdown --output lychee/out.md './**/*.md'

      - name: Append lychee report to job summary
        if: always()
        run: |
          if [ -f lychee/out.md ]; then
            echo '## Lychee link-check report' >> "$GITHUB_STEP_SUMMARY"
            cat lychee/out.md >> "$GITHUB_STEP_SUMMARY"
          fi
