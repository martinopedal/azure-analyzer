name: PR Advisory Gate

# Universal advisory review gate (#109). Fires on every PR open / ready /
# synchronize from a squad agent or Copilot, builds the 3-model triage bundle
# under `.squad/decisions/inbox/`, and posts a single advisory comment on the
# PR under the `<!-- squad-advisory -->` marker. NON-BLOCKING, merge is never
# gated by this workflow, the human / Copilot reviewer has the final say.
#
# Severity tags follow the #108 taxonomy. Untagged findings emitted by the
# gate are auto-tagged `[correctness]` before being posted (fail-safe).
#
# SECURITY:
# We use `pull_request_target` (not `pull_request`) so the workflow runs in
# the BASE-ref context with the BASE token. Combined with the fork-skip
# guard below, a fork PR cannot substitute a malicious gate script and
# exfiltrate the `pull-requests: write` token. We deliberately do NOT check
# out the PR head, `actions/checkout@v6` with no `ref:` defaults to the
# base SHA for `pull_request_target`, so the script we execute is always
# the trusted base-ref copy.
#
# Disable repo-wide by setting the `SQUAD_ADVISORY_GATE=0` repo variable.

on:
  pull_request_target:
    types: [opened, ready_for_review, synchronize]

permissions:
  pull-requests: write
  contents: read
  statuses: write

concurrency:
  group: pr-advisory-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  advisory-gate:
    # Skip fork PRs entirely (defense in depth on top of pull_request_target).
    # Skip drafts that are not yet flagged ready_for_review when the trigger
    # is `opened`, the workflow re-fires on `ready_for_review`.
    if: >-
      github.event.pull_request != null
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # justified: gate is non-blocking by design (advisory only, see #109).
    # Job-level continue-on-error ensures any uncaught failure inside the
    # gate never red-checks a PR. The rubberduck-gate commit status is
    # posted separately by the final step and defaults to success on empty
    # gate-state, so PR mergeability is not affected by gate exceptions.
    # tracked: martinopedal/azure-analyzer#604 - hotfix-debt
    continue-on-error: true
    steps:
      - name: Checkout base ref (trusted gate script)
        # No `ref:` -> checks out the base SHA for pull_request_target events,
        # so we run the trusted base-ref copy of Invoke-PRAdvisoryGate.ps1,
        # never the PR head's (potentially malicious) version.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PowerShell
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: bash
          command: |
            if ! command -v pwsh >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y powershell
            fi

      - name: Run advisory gate
        id: gate
        # Belt-and-braces: even with the script's internal try/catch + infra
        # fallback, any uncaught non-zero exit would otherwise red-check the
        # advisory-gate job on the PR. The gate is non-blocking by design, so
        # we never want this step to fail the PR. Step 6 still posts the
        # rubberduck-gate commit status and defaults to success on empty
        # gate-state.
        # tracked: martinopedal/azure-analyzer#604 - hotfix-debt
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SQUAD_ADVISORY_GATE: ${{ vars.SQUAD_ADVISORY_GATE || '1' }}
          SQUAD_AGENT_LOGINS: ${{ vars.SQUAD_AGENT_LOGINS || '' }}
        shell: pwsh
        # no-retry: step writes triage plan files locally and is wrapped end-to-end in
        # try/catch that degrades to advisory no-op on any failure. The single inline
        # `gh pr diff` already has its own try/catch fallback. Re-running the whole
        # step on a partial failure would overwrite the plan file with a fresh result.
        run: |
          try {
            $enabled = $env:SQUAD_ADVISORY_GATE -ne '0'
            $owner, $repo = $env:REPO_NAME.Split('/', 2)

            . ./modules/shared/Sanitize.ps1
            . ./modules/shared/Get-CopilotReviewFindings.ps1
            . ./modules/shared/Build-CopilotTriagePlan.ps1

            $copilotFindings = Get-CopilotReviewFindings `
              -Owner $owner `
              -Repo $repo `
              -PullNumber ([int]$env:PR_NUMBER)

            $diffContext = ''
            try {
              $rawDiff = & gh pr diff ([int]$env:PR_NUMBER) --repo $env:REPO_NAME 2>$null
              if ($LASTEXITCODE -eq 0 -and -not [string]::IsNullOrWhiteSpace([string]$rawDiff)) {
                $diffContext = Remove-Credentials ([string]$rawDiff)
              }
            } catch {
              $diffContext = ''
            }

            $triagePlan = Build-CopilotTriagePlan -Findings $copilotFindings -DiffContext $diffContext
            New-Item -Path '.squad/decisions/inbox/' -ItemType Directory -Force | Out-Null
            $shortSha = if ($env:PR_HEAD_SHA.Length -ge 12) { $env:PR_HEAD_SHA.Substring(0, 12) } else { $env:PR_HEAD_SHA }
            $planPath = ".squad/decisions/inbox/copilot-triage-plan-$($env:PR_NUMBER)-$shortSha.json"
            $planJson = Remove-Credentials ($triagePlan | ConvertTo-Json -Depth 20)
            Set-Content -Path $planPath -Value $planJson -Encoding utf8
            "copilot-plan-path=$planPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "copilot-finding-count=$(@($copilotFindings).Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            ./modules/shared/Invoke-PRAdvisoryGate.ps1 `
              -PRNumber ([int]$env:PR_NUMBER) `
              -Repo $env:REPO_NAME `
              -PRAuthor $env:PR_AUTHOR `
              -OutputPath '.squad/decisions/inbox/' `
              -HeadSha $env:PR_HEAD_SHA `
              -CopilotTriagePlanPath $planPath `
              -Enabled:$enabled
          } catch {
            $safeMessage = Remove-Credentials ([string]$_.Exception.Message)
            $skipReason = ("degraded: $safeMessage" -replace '[\r\n]+', ' ').Trim()
            Write-Warning "PR advisory gate degraded to advisory no-op: $safeMessage"
            "gate-state=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "skip-reason=$skipReason" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

      - name: Post rejection justification replies
        if: always() && steps.gate.outputs.unaddressed-copilot-threads != '' && steps.gate.outputs.gate-state == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          UNADDRESSED_COPILOT_THREADS: ${{ steps.gate.outputs.unaddressed-copilot-threads }}
        shell: pwsh
        # no-retry: posts review thread replies via Add-ResolutionReply; replies are
        # not idempotent (each retry would post a duplicate reply on the thread).
        run: |
          . ./modules/shared/Resolve-PRReviewThreads.ps1

          $threads = @()
          try {
            $threads = @($env:UNADDRESSED_COPILOT_THREADS | ConvertFrom-Json -Depth 10)
          } catch {
            Write-Warning "Could not parse unresolved Copilot thread payload: $($_.Exception.Message)"
            $threads = @()
          }

          foreach ($thread in $threads) {
            if (-not $thread.PSObject.Properties['CommentDatabaseId']) { continue }
            if ([string]::IsNullOrWhiteSpace([string]$thread.CommentDatabaseId)) { continue }
            $cat = [string]$thread.Category
            $rationale = "multi-model rejection: 2-of-3 frontier consensus did not validate this Copilot finding for category '$cat' on head SHA $($env:PR_HEAD_SHA)."
            Add-ResolutionReply `
              -PRNumber ([int]$env:PR_NUMBER) `
              -Repo $env:REPO_NAME `
              -InReplyToCommentDatabaseId ([string]$thread.CommentDatabaseId) `
              -Sha $env:PR_HEAD_SHA `
              -Rationale $rationale | Out-Null
          }

      - name: Post rubberduck-gate commit status
        # Always post the rubberduck-gate status against the PR head SHA so
        # branch protection can require it (#173). When the gate body
        # short-circuits (non-squad author, skip-advisory label, disabled),
        # the script emits gate-state=success with a skip-reason; we still
        # post a success status so the required context is present on the
        # commit and merging is not blocked.
        # no-retry: idempotent one-shot side effect; CI surfaces failures.
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_NAME: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GATE_STATE: ${{ steps.gate.outputs.gate-state }}
          GATE_SKIP_REASON: ${{ steps.gate.outputs.skip-reason }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          # Default to 'success' when gate-state is empty: this only happens
          # if the inner script aborted before emitting any output (e.g. pwsh
          # install failure). Treat such infra failures as non-blocking; the
          # workflow run itself surfaces the underlying error.
          $state = if ($env:GATE_STATE -eq 'success' -or $env:GATE_STATE -eq 'failure') { $env:GATE_STATE } else { 'success' }
          $description = if (-not [string]::IsNullOrWhiteSpace($env:GATE_SKIP_REASON)) {
            "Gate skipped: $($env:GATE_SKIP_REASON)"
          } elseif ($state -eq 'success') {
            '2-of-3 frontier consensus, no [blocker]/[correctness]'
          } else {
            'Gate failed: missing consensus or veto-class finding'
          }
          if ($description.Length -gt 140) {
            $description = $description.Substring(0, 137) + '...'
          }
          & gh api -X POST "repos/$env:REPO_NAME/statuses/$env:PR_HEAD_SHA" `
            -f context='rubberduck-gate' `
            -f state=$state `
            -f "description=$description" `
            -f "target_url=$env:RUN_URL"
