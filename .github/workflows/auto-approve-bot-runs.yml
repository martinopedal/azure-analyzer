name: Auto-approve trusted bot workflow runs

# Permanent fix for the "Expected -- Waiting for status to be reported" wedge
# on agent-pushed PRs. GitHub treats first-time / app-bot contributors as
# "outside collaborators" and gates their workflow_run with a manual
# "Approve and run workflow" click. That gate blocks the iterate-until-green
# loop on every cloud-agent PR. This workflow auto-approves runs whose
# triggering actor is in the trusted allow-list.
#
# Security model:
#   - Allow-list is hard-coded below (not data-driven, not from PR content)
#   - We only ever call the /approve endpoint, never modify code or merge
#   - Runs on workflow_run.types=[requested], so it fires BEFORE the gated
#     run starts -- the gate is what creates the "requested" event
#   - Self-skip if the triggering actor is not trusted (no-op exit)

on:
  workflow_run:
    workflows:
      - "CI"
      - "CodeQL"
      - "Docs Check"
      - "Markdown Check"
      - "Stub deadline check"
      - "Copilot Agent PR Review"
      - "PR Advisory Gate"
      - "PR Review Gate"
      - "PR Auto-Resolve Review Threads"
      - "CI failure watchdog"
      - "Bicep Build"
      - "ALZ queries drift check"
    types: [requested]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write
  pull-requests: read
  contents: read

concurrency:
  group: auto-approve-bot-runs-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  approve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Approve run if actor is trusted
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.event.workflow_run.id || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          ACTOR: ${{ github.event.workflow_run.actor.login || github.event.pull_request.user.login || '' }}
          TRIGGERING_ACTOR: ${{ github.event.workflow_run.triggering_actor.login || github.triggering_actor || '' }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'pull_request_target-fallback' }}
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: |
            set -euo pipefail

            approve_run() {
              local run_id="$1"
              local workflow_label="$2"
              local run_state status conclusion
              run_state="$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '{status: .status, conclusion: .conclusion}')"
              status="$(printf '%s' "$run_state" | jq -r '.status')"
              conclusion="$(printf '%s' "$run_state" | jq -r '.conclusion')"
              echo "Run ${run_id} (workflow='${workflow_label}') status=${status} conclusion=${conclusion}"

              if [ "$status" != "action_required" ] && [ "$conclusion" != "action_required" ]; then
                echo "Run ${run_id} is not gated on approval. Skipping."
                return 0
              fi

              echo "Approving run ${run_id} for trusted actor '${ACTOR}'."
              if ! gh api -X POST "repos/${REPO}/actions/runs/${run_id}/approve" >approve.out 2>&1; then
                echo "Approve call failed:"
                cat approve.out
                # A 403/422 here is expected when the run was already approved by a
                # parallel invocation. Treat that as success.
                if grep -Eq "already|action is not required" approve.out; then
                  echo "Run already approved (or no longer waiting). Treating as success."
                  return 0
                fi
                return 1
              fi
              echo "Approved."
            }

            # Hard-coded allow-list. Adding to this list is a code change that
            # goes through review + the rubber-duck gate. Do NOT source from
            # PR content, env vars, or workflow inputs.
            trusted=(
              "copilot-swe-agent[bot]"
              "Copilot"
              "copilot"
              "dependabot[bot]"
              "github-actions[bot]"
              "martinopedal"
            )
  
            is_trusted=false
            for t in "${trusted[@]}"; do
              if [ "$ACTOR" = "$t" ] || [ "$TRIGGERING_ACTOR" = "$t" ]; then
                is_trusted=true
                break
              fi
            done
  
            if [ "$is_trusted" != "true" ]; then
              echo "Actor '$ACTOR' (triggering: '$TRIGGERING_ACTOR') not in trusted allow-list. No approval issued."
              exit 0
            fi

            if [ "$EVENT_NAME" = "workflow_run" ]; then
              approve_run "$RUN_ID" "$WORKFLOW_NAME"
              exit 0
            fi

            if [ "$EVENT_NAME" != "pull_request_target" ]; then
              echo "Unsupported event '${EVENT_NAME}'. Nothing to do."
              exit 0
            fi

            if [ -z "${PR_NUMBER}" ] || [ -z "${HEAD_REF}" ] || [ -z "${HEAD_SHA}" ]; then
              echo "pull_request_target payload missing PR identifiers. Nothing to do."
              exit 0
            fi

            mapfile -t run_ids < <(
              gh api "repos/${REPO}/actions/runs?event=pull_request&branch=${HEAD_REF}&per_page=100" \
                --jq ".workflow_runs[] | select((.status == \"action_required\" or .conclusion == \"action_required\") and .head_sha == \"${HEAD_SHA}\" and ([.pull_requests[].number] | index(${PR_NUMBER}))) | .id"
            )
            if [ "${#run_ids[@]}" -eq 0 ]; then
              echo "No action_required pull_request runs found for PR #${PR_NUMBER} at ${HEAD_SHA}."
              exit 0
            fi

            for run_id in "${run_ids[@]}"; do
              approve_run "${run_id}" "pull_request_target-fallback"
            done
