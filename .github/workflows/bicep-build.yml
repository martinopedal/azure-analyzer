name: Bicep Build

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/bicep-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/bicep-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bicep-build:
    name: Bicep build smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build continuous-control.bicep
        run: az bicep build --file infra/continuous-control.bicep

      - name: Bicep lint
        run: az bicep lint --file infra/continuous-control.bicep
