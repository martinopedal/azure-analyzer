name: Copilot Agent PR Review

# Automatically request Copilot code review on EVERY PR (squad agent, human, bot,
# external contributor) so the Comment Triage Loop in .copilot/copilot-instructions.md
# always has Copilot findings to triage.
#
# Maintainer policy (see .copilot/copilot-instructions.md "Copilot Review is Mandatory
# on Every PR"): no PR may merge until the most recent commit has a Copilot review
# and every Copilot thread is resolved or answered.

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  request-copilot-review:
    # Skip drafts (Copilot review is requested when PR is marked ready) and fork PRs
    # (no write token under pull_request_target, cannot request reviewers anyway).
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # no-retry: github-script wraps Octokit which already retries 5xx + 429.
      # The reviewer-request is idempotent (POST returns 422 if already requested
      # -- caught by try/catch -> warning) and the policy comment is gated by
      # `isFirstRun` so a manual re-run cannot post duplicate comments.
      - name: Request Copilot code review
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const isCloudAgent = author === 'copilot-swe-agent[bot]' || author === 'Copilot';

            try {
              await github.request('POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: ['copilot-pull-request-reviewer'],
                headers: { 'X-GitHub-Api-Version': '2022-11-28' }
              });
              core.info(`Requested Copilot code review on PR #${pr.number} (author: ${author})`);
            } catch (err) {
              core.warning(`Could not request Copilot review (repo-level auto-review may need to be enabled in Settings → Copilot → Code review): ${err.message}`);
            }

            // Only post the policy reminder once per PR (on opened/ready/reopened),
            // not on every synchronize push.
            const isFirstRun = ['opened', 'ready_for_review', 'reopened'].includes(context.payload.action);
            if (!isFirstRun) {
              core.info('Skipping policy reminder comment on synchronize event.');
              return;
            }

            const cloudAgentLine = isCloudAgent
              ? '2. @copilot (the authoring agent) MUST address every Copilot review comment with either a code change or an explicit reply explaining why it does not apply.'
              : '2. The PR author MUST address every Copilot review comment via the Comment Triage Loop (gather → plan → 3-model consensus → implement → reply).';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '### 🔁 Copilot review contract',
                '',
                '1. Copilot code review has been requested on this PR.',
                cloudAgentLine,
                '3. Maintainers MUST NOT squash-merge this PR until all Copilot review threads are **Resolved or answered**.',
                '4. Required CI checks must be green.',
                '',
                'See `.copilot/copilot-instructions.md` → "Copilot Review is Mandatory on Every PR" and "Comment Triage Loop" for the full contract.'
              ].join('\n')
            });
