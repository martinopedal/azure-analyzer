name: PR Auto-Resolve Review Threads

# Closes part of #106. When a squad agent pushes a fix that addresses an
# inline review comment, the corresponding review thread is auto-resolved.
# Threads whose file/line range was NOT touched by the new commits stay open
# (the reviewer decides). Disable with `SQUAD_AUTO_RESOLVE_THREADS=0`.

# SECURITY (#137 gate fix, Goldeneye-2):
# We use `pull_request_target` (not `pull_request`) so the workflow runs in the
# context of the BASE ref with the BASE token. This prevents a fork PR from
# substituting a malicious resolver script and exfiltrating the
# `pull-requests: write` token. We deliberately do NOT check out the PR head;
# `actions/checkout@v6` with no `ref` defaults to the base SHA for
# `pull_request_target`, so the resolver we execute is always the trusted
# base-ref copy. As an additional belt-and-braces guard, the job is skipped
# entirely when the PR head repo is a fork.
on:
  pull_request_target:
    types: [synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted, edited]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: pr-auto-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-resolve:
    # Skip drafts that have not had a review yet, nothing to resolve.
    # Also skip fork PRs entirely (defense in depth on top of pull_request_target).
    if: >-
      github.event.pull_request != null
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base ref (trusted resolver)
        # No `ref:` -> checks out the base SHA for pull_request_target events,
        # so we run the trusted base-ref copy of Resolve-PRReviewThreads.ps1,
        # never the PR head's (potentially malicious) version.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PowerShell
        run: |
          if ! command -v pwsh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y powershell
          fi

      - name: Resolve addressed review threads
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          SQUAD_AUTO_RESOLVE_THREADS: ${{ vars.SQUAD_AUTO_RESOLVE_THREADS || '1' }}
        shell: pwsh
        run: |
          ./modules/shared/Resolve-PRReviewThreads.ps1 `
            -PRNumber ([int]$env:PR_NUMBER) `
            -Repo $env:REPO_NAME
