name: PR Auto-Resolve Review Threads

# Closes part of #106. When a squad agent pushes a fix that addresses an
# inline review comment, the corresponding review thread is auto-resolved.
# Threads whose file/line range was NOT touched by the new commits stay open
# (the reviewer decides). Disable with `SQUAD_AUTO_RESOLVE_THREADS=0`.

# SECURITY (#137 gate fix, Goldeneye-2):
# We use `pull_request_target` (not `pull_request`) so the workflow runs in the
# context of the BASE ref with the BASE token. This prevents a fork PR from
# substituting a malicious resolver script and exfiltrating the
# `pull-requests: write` token. We deliberately do NOT check out the PR head;
# `actions/checkout@v6` with no `ref` defaults to the base SHA for
# `pull_request_target`, so the resolver we execute is always the trusted
# base-ref copy. As an additional belt-and-braces guard, the job is skipped
# entirely when the PR head repo is a fork.
on:
  pull_request_target:
    types: [synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted, edited]

concurrency:
  group: pr-auto-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-resolve:
    # Skip drafts that have not had a review yet, nothing to resolve.
    # Also skip fork PRs entirely (defense in depth on top of pull_request_target).
    if: >-
      github.event.pull_request != null
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Job-scope permissions (Hawkeye-C5): resolveReviewThread GraphQL mutation
    # requires pull-requests:write on the token. Keep at job scope to avoid
    # broadening the whole workflow surface.
    permissions:
      pull-requests: write
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout base ref (trusted resolver)
        # No `ref:` -> checks out the base SHA for pull_request_target events,
        # so we run the trusted base-ref copy of Resolve-PRReviewThreads.ps1,
        # never the PR head's (potentially malicious) version.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install PowerShell
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: bash
          command: |
            if ! command -v pwsh >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y powershell
            fi

      - name: Resolve addressed review threads
        # Belt-and-braces: GitHub's GraphQL `resolveReviewThread` rejects
        # bot-vs-bot resolution (e.g., GHA bot trying to resolve a Copilot
        # Code Review thread) with FORBIDDEN even when `pull-requests: write`
        # is granted. That is a platform limit, not a fixable perms issue, so
        # we treat it as non-fatal and never red-check the PR on it.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          SQUAD_AUTO_RESOLVE_THREADS: ${{ vars.SQUAD_AUTO_RESOLVE_THREADS || '1' }}
        shell: pwsh
        # no-retry: inner script already swallows transient + bot-vs-bot FORBIDDEN
        # via try/catch and exits 0 with a ::warning::. Wrapping the whole step in
        # nick-fields/retry would re-run the resolver on every transient hiccup and
        # could double-resolve threads where the first attempt partially succeeded
        # before the GraphQL error surfaced.
        run: |
          try {
            $result = ./modules/shared/Resolve-PRReviewThreads.ps1 `
              -PRNumber ([int]$env:PR_NUMBER) `
              -Repo $env:REPO_NAME
            $result | ConvertTo-Json -Depth 10 | Write-Host
            if ($result.Status -eq 'Failed' -and $result.ErrorMessage -match 'FORBIDDEN|Resource not accessible by integration') {
              Write-Host "::warning::Auto-resolve hit known bot-vs-bot GraphQL FORBIDDEN; treating as non-fatal."
              exit 0
            }
            if ($result.Status -eq 'Failed') {
              Write-Host "::warning::Auto-resolve failed: $($result.ErrorMessage)"
              exit 0
            }
          } catch {
            Write-Host "::warning::Auto-resolve threw: $($_.Exception.Message)"
            exit 0
          }
