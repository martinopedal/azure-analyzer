name: PR Auto-Resolve Review Threads

# Closes part of #106. When a squad agent pushes a fix that addresses an
# inline review comment, the corresponding review thread is auto-resolved.
# Threads whose file/line range was NOT touched by the new commits stay open
# (the reviewer decides). Disable with `SQUAD_AUTO_RESOLVE_THREADS=0`.

# SECURITY (#137 gate fix, Goldeneye-2):
# We use `pull_request_target` (not `pull_request`) so the workflow runs in the
# context of the BASE ref with the BASE token. This prevents a fork PR from
# substituting a malicious resolver script and exfiltrating the
# `pull-requests: write` token. We deliberately do NOT check out the PR head;
# `actions/checkout@v6` with no `ref` defaults to the base SHA for
# `pull_request_target`, so the resolver we execute is always the trusted
# base-ref copy. As an additional belt-and-braces guard, the job is skipped
# entirely when the PR head repo is a fork.
on:
  pull_request_target:
    types: [synchronize, ready_for_review, reopened]
  pull_request_review:
    types: [submitted, edited]

# Top-level least-privilege default. The auto-resolve job uses a GitHub App
# installation token (minted in-job) for the actual write operations, so the
# default GITHUB_TOKEN stays read-only.
permissions:
  contents: read

concurrency:
  group: pr-auto-resolve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-resolve:
    # Skip drafts that have not had a review yet, nothing to resolve.
    # Also skip fork PRs entirely (defense in depth on top of pull_request_target).
    if: >-
      github.event.pull_request != null
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN only needs read access -- write scope is
    # carried by the GitHub App installation token minted in the
    # `app-token` step (pull_requests:write granted at install time).
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout base ref (trusted resolver)
        # No `ref:` -> checks out the base SHA for pull_request_target events,
        # so we run the trusted base-ref copy of Resolve-PRReviewThreads.ps1,
        # never the PR head's (potentially malicious) version.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mint GitHub App installation token
        # The default GITHUB_TOKEN cannot resolve review threads it did not
        # author (e.g. Copilot Code Review threads): GraphQL returns
        # FORBIDDEN on `resolveReviewThread` for bot-vs-bot resolution.
        # We mint an installation token from the `azure-analyzer-thread-resolver`
        # GitHub App, which is treated as a first-class actor with
        # pull_requests:write and bypasses the bot-on-bot block.
        # See docs/operations/copilot-thread-resolution.md for the runbook.
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v1
        with:
          app-id: ${{ secrets.RESOLVE_THREADS_APP_ID }}
          private-key: ${{ secrets.RESOLVE_THREADS_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Install PowerShell
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: bash
          command: |
            if ! command -v pwsh >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y powershell
            fi

      - name: Resolve addressed review threads
        # Uses the GitHub App installation token (minted above) so that
        # `resolveReviewThread` succeeds even on Copilot Code Review threads.
        # Per-thread tolerance lives in the resolver itself (#843): tolerable
        # GraphQL classifications (AlreadyResolved, Outdated, NotFound,
        # Forbidden, Transient) are logged and skipped. Only Fatal auth /
        # schema / unknown errors bubble up as Status=Failed.
        #
        # Step-level continue-on-error (#843): auto-resolve is a
        # non-required convenience automation. Even after per-thread
        # tolerance, a genuine network outage on the graphql endpoint must
        # not paint every PR red on a non-required check and train the
        # squad to ignore CI signal.
        # tracked: martinopedal/azure-analyzer#604
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
          SQUAD_AUTO_RESOLVE_THREADS: ${{ vars.SQUAD_AUTO_RESOLVE_THREADS || '1' }}
        shell: pwsh
        run: |
          $result = ./modules/shared/Resolve-PRReviewThreads.ps1 `
            -PRNumber ([int]$env:PR_NUMBER) `
            -Repo $env:REPO_NAME
          $result | ConvertTo-Json -Depth 10 | Write-Host
          if ($result.Status -eq 'Failed') {
            Write-Host "::error::Auto-resolve failed: $($result.ErrorMessage)"
            exit 1
          }
