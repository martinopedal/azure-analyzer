name: CodeQL
# trigger: re-run for #220 (Resources tab; no workflow logic change)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 1 * * 0"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    # no-retry: this workflow only composes vetted official actions
    # (actions/checkout + github/codeql-action/{init,autobuild,analyze}) which
    # ship their own retry/backoff for upstream registry + database fetches.
    # No `run:` blocks perform external network I/O.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.2
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.2
        with:
          category: "/language:${{matrix.language}}"
