name: CodeQL
# trigger: re-run for #220 (Resources tab; no workflow logic change)
# trigger: re-run for #721 (policy track C; no workflow logic change)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 1 * * 0"
  workflow_dispatch:

# Top-level least-privilege default. The analyze job overrides with the
# narrower scopes it actually needs (security-events: write, actions: read).
permissions:
  contents: read

# Per-ref group so runs on different branches/PRs don't cancel each other.
# cancel-in-progress=true: pushing a new commit to the same ref cancels the
# previous in-flight CodeQL run (the new sha is what matters anyway).
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    # Retry policy: analysis itself is pure-compute on the runner, but SARIF
    # upload hits the GitHub code-scanning API with the installation token,
    # which is a shared, rate-limited budget across every workflow in the
    # repo. On busy days we see HTTP 429 "API rate limit exceeded for
    # installation" on the POST even though analysis passed (26/26 files).
    # We therefore split analyze (upload: never) from upload-sarif, and
    # retry the upload up to 3x with backoff. No `run:` blocks perform
    # external network I/O beyond the backoff sleep.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # Pre-flight: CodeQL analyze hits the GitHub API installation-scoped
      # rate-limit bucket (shared across every workflow in the repo). On
      # high-traffic days we see "API rate limit exceeded for installation"
      # mid-analyze, which fails the required check for reasons that are
      # purely environmental (not a code issue). Before running init, check
      # the remaining quota and sleep until reset if near empty. Cap the
      # wait at 20 minutes to stay well inside the 30-min job timeout.
      - name: Wait for API rate limit if exhausted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rl=$(gh api /rate_limit 2>/dev/null || echo '{}')
          remaining=$(printf '%s' "$rl" | jq -r '.resources.core.remaining // 5000')
          reset=$(printf '%s' "$rl" | jq -r '.resources.core.reset // 0')
          now=$(date +%s)
          echo "GitHub API core: remaining=$remaining reset=$reset now=$now"
          # Threshold: CodeQL analyze uses ~200-400 API calls for telemetry +
          # result reporting. Wait if under 500 to give headroom.
          if [ "$remaining" -lt 500 ] && [ "$reset" -gt "$now" ]; then
            wait=$(( reset - now + 15 ))
            # Cap wait at 20 minutes (job timeout is 30)
            if [ "$wait" -gt 1200 ]; then wait=1200; fi
            echo "::notice::Rate limit low ($remaining left); waiting ${wait}s for reset"
            sleep "$wait"
            # Re-check after wait for diagnostics
            gh api /rate_limit --jq '.resources.core' || true
          else
            echo "Rate limit healthy; proceeding"
          fi
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - name: Analyze (no upload) - attempt 1
        id: analyze1
        # tracked: martinopedal/azure-analyzer#604 - hotfix-debt
        continue-on-error: true
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{matrix.language}}"
          upload: never
          output: sarif-results
      # If attempt 1 fails AND the failure reason is rate-limit, wait for
      # reset and retry once. Any other failure mode fails fast (the retry
      # below is skipped via the condition).
      - name: Wait for rate-limit reset before retry
        if: steps.analyze1.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rl=$(gh api /rate_limit 2>/dev/null || echo '{}')
          remaining=$(printf '%s' "$rl" | jq -r '.resources.core.remaining // 5000')
          reset=$(printf '%s' "$rl" | jq -r '.resources.core.reset // 0')
          now=$(date +%s)
          if [ "$remaining" -lt 500 ] && [ "$reset" -gt "$now" ]; then
            wait=$(( reset - now + 15 ))
            if [ "$wait" -gt 900 ]; then wait=900; fi
            echo "::notice::Analyze failed; waiting ${wait}s for rate-limit reset before retry"
            sleep "$wait"
          else
            echo "::notice::Analyze failed but rate limit is healthy — retry in 30s"
            sleep 30
          fi
      - name: Analyze (no upload) - attempt 2
        if: steps.analyze1.outcome == 'failure'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: "/language:${{matrix.language}}"
          upload: never
          output: sarif-results
      - name: Upload SARIF (attempt 1)
        id: upload1
        # tracked: martinopedal/azure-analyzer#604 - hotfix-debt
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: sarif-results
          category: "/language:${{matrix.language}}"
      - name: Backoff before retry 2
        if: steps.upload1.outcome == 'failure'
        run: sleep 45
      - name: Upload SARIF (attempt 2)
        id: upload2
        if: steps.upload1.outcome == 'failure'
        # tracked: martinopedal/azure-analyzer#604 - hotfix-debt
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: sarif-results
          category: "/language:${{matrix.language}}"
      - name: Backoff before retry 3
        if: steps.upload1.outcome == 'failure' && steps.upload2.outcome == 'failure'
        run: sleep 120
      - name: Upload SARIF (attempt 3, final)
        if: steps.upload1.outcome == 'failure' && steps.upload2.outcome == 'failure'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: sarif-results
          category: "/language:${{matrix.language}}"
