name: CodeQL
# trigger: re-run for #220 (Resources tab; no workflow logic change)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 1 * * 0"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: github/codeql-action/init@0e9f55954318745b37b7933c693bc093f7336125 # v4.35.1
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@0e9f55954318745b37b7933c693bc093f7336125 # v4.35.1
      - uses: github/codeql-action/analyze@0e9f55954318745b37b7933c693bc093f7336125 # v4.35.1
        with:
          category: "/language:${{matrix.language}}"
