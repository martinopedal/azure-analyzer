name: Markdown Check

# Replaces the legacy "Markdown Link Check" workflow with a 3-job split:
#   - lint:    structural / style validation (markdownlint-cli2)
#   - links:   external + internal link validation (lychee + cache)
#   - em-dash: repo-policy gate, no em-dashes in changed Markdown on PRs
#
# Tracker: #516. Replaces .github/workflows/markdown-link-check.yml.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.lychee.toml'
      - '.github/workflows/markdown-check.yml'
  schedule:
    # Mondays 06:00 UTC: catches link-rot independent of PR cadence.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: markdown-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            **/*.md

  links:
    name: links (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: |
            lychee-cache-

      - name: Install lychee CLI (pinned)
        env:
          LYCHEE_VERSION: v0.23.0
        run: |
          set -euo pipefail
          curl --retry 3 --retry-delay 5 -fsSL \
            "https://github.com/lycheeverse/lychee/releases/download/lychee-${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" \
            -o lychee.tgz
          mkdir -p .lychee-bin && tar -xzf lychee.tgz -C .lychee-bin
          sudo install -m 0755 .lychee-bin/lychee /usr/local/bin/lychee
          rm -rf .lychee-bin lychee.tgz
          mkdir -p lychee
          lychee --version

      - name: Resolve markdown scope for lychee
        id: lychee-scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          targets_file='lychee/targets.txt'
          targets=()
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ]; then
              echo "Error: BASE_SHA or HEAD_SHA is missing from pull_request event context. These values are required to determine changed Markdown files in the PR. Ensure the workflow is triggered by a pull_request event with a valid base and head SHA."
              exit 1
            fi
            mapfile -t targets < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '**/*.md' \
              ':(exclude).copilot/audits/**' \
              ':(exclude).copilot/status/**' \
              ':(exclude).copilot/session-state/**' \
              ':(exclude).squad/decisions/inbox/**' \
              ':(exclude).atlas-stash/**')
          else
            mapfile -t targets < <(git ls-files '**/*.md' \
              ':(exclude).copilot/audits/**' \
              ':(exclude).copilot/status/**' \
              ':(exclude).copilot/session-state/**' \
              ':(exclude).squad/decisions/inbox/**' \
              ':(exclude).atlas-stash/**')
          fi

          if [ ${#targets[@]} -eq 0 ]; then
            echo "No Markdown files in lychee scope; skipping link check."
            echo 'has_targets=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${targets[@]}" > "$targets_file"
          echo "Markdown files in lychee scope: ${#targets[@]}"
          echo 'has_targets=true' >> "$GITHUB_OUTPUT"
          echo "targets_file=$targets_file" >> "$GITHUB_OUTPUT"

      - name: Check markdown links (workflow-level retry on transient errors)
        if: steps.lychee-scope.outputs.has_targets == 'true'
        id: lychee
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          on_retry_command: rm -rf .lycheecache lychee/out.md
          command: |
            mapfile -t lychee_targets < "${{ steps.lychee-scope.outputs.targets_file }}"
            lychee --config .lychee.toml --cache --max-cache-age 7d --github-token "$GITHUB_TOKEN" --format markdown --output lychee/out.md "${lychee_targets[@]}"

      - name: Append lychee report to job summary
        if: always()
        run: |
          if [ -f lychee/out.md ]; then
            echo '## Lychee link-check report' >> "$GITHUB_STEP_SUMMARY"
            cat lychee/out.md >> "$GITHUB_STEP_SUMMARY"
          fi

  em-dash:
    name: em-dash policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install ripgrep
        run: sudo apt-get update -y && sudo apt-get install -y ripgrep

      # PR mode: only block on em-dashes introduced by this PR. Avoids
      # back-pressure on the existing em-dash backlog (tracked separately).
      #
      # We scan only the *added* lines (unified=0 diff, lines prefixed with
      # '+' but not '+++') so pre-existing em-dashes in files that happen to
      # be modified do not re-trigger the gate on every touch. This is the
      # tightest possible scope and matches the repo policy "no em-dashes
      # *introduced* by a PR".
      - name: Em-dash gate (added lines only)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.md' \
            ':(exclude).copilot/audits/**' \
            ':(exclude).copilot/status/**' \
            ':(exclude).copilot/session-state/**' \
            ':(exclude).squad/decisions/inbox/**' \
            ':(exclude).atlas-stash/**')
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No changed Markdown files; skipping em-dash gate."
            exit 0
          fi
          echo "Scanning added lines in changed files:"
          printf ' - %s\n' "${changed[@]}"
          # Extract only added lines (lines starting with '+' but not '+++').
          added_lines=$(git diff --unified=0 --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- '*.md' \
            ':(exclude).copilot/audits/**' \
            ':(exclude).copilot/status/**' \
            ':(exclude).copilot/session-state/**' \
            ':(exclude).squad/decisions/inbox/**' \
            ':(exclude).atlas-stash/**' \
            | grep -E '^\+' \
            | grep -Ev '^\+\+\+ ' || true)
          if [ -z "$added_lines" ]; then
            echo "No added lines in changed Markdown; skipping em-dash gate."
            exit 0
          fi
          # U+2014 (em dash) and U+2013 (en dash) are forbidden by repo policy.
          # Advisory only: warn (do not fail) on em-dash / en-dash introduction.
          # Repo style preference: avoid U+2014 / U+2013 in Markdown — but this
          # is not a release blocker, so we surface as a warning rather than
          # blocking CI.
          if printf '%s\n' "$added_lines" | rg -n -e $'\u2014' -e $'\u2013'; then
            echo ""
            echo "::warning::Em-dash (U+2014) or en-dash (U+2013) found in lines added by this PR. Repo style preference: replace with ' - ' (space-hyphen-space) or rewrite the sentence. (Advisory only - not blocking.)"
          else
            echo "OK: no em-dashes introduced by this PR."
          fi

      # Schedule / manual: full corpus scan, advisory only (writes to summary).
      - name: Em-dash backlog scan (advisory)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          {
            echo '## Em-dash backlog (advisory)'
            echo ''
            echo 'Files containing U+2014 or U+2013:'
            echo ''
            echo '```'
            rg -l -e $'\u2014' -e $'\u2013' --glob '*.md' --glob '*.ps1' --glob '*.yml' --glob '!.git/**' --glob '!node_modules/**' --glob '!output*/**' || echo '(none)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
