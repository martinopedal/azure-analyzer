name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Pester
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: pwsh
          command: |
            if (-not (Get-Module -ListAvailable -Name Pester)) {
              Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0
            }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0 -Force
          $config = [PesterConfiguration]::Default
          $config.Run.Path = './tests'
          # Keep Exit disabled so we can persist pester-count.json before failing.
          $config.Run.Exit = $false
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.CodeCoverage.Enabled = $false
          $result = Invoke-Pester -Configuration $config
          if ($null -eq $result) {
            Write-Error "Invoke-Pester returned null; cannot record TotalCount."
            exit 1
          }
          $outputDir = Join-Path (Get-Location) 'output'
          if (-not (Test-Path $outputDir)) { $null = New-Item -ItemType Directory -Path $outputDir -Force }
          [pscustomobject]@{
            TotalCount = [int]$result.TotalCount
            PassedCount = [int]$result.PassedCount
            FailedCount = [int]$result.FailedCount
            SkippedCount = [int]$result.SkippedCount
            GeneratedAt = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json -Depth 5 | Set-Content -Path (Join-Path $outputDir 'pester-count.json') -Encoding UTF8
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester failures detected: $($result.FailedCount)"
            exit 1
          }

      - name: Upload current Pester count
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-count-${{ matrix.os }}
          path: output/pester-count.json
          retention-days: 7

      - name: Compare Pester TotalCount to previous main baseline
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_WORKFLOW_FILE: ci.yml
        shell: pwsh
        # no-retry: step orchestrates a multi-run artifact walk with its own
        # per-iteration retry + cleanup. Wrapping the whole step would restart
        # the walk and risk silent baseline mismatches.
        run: |
          $currentPath = Join-Path (Get-Location) 'output' 'pester-count.json'
          if (-not (Test-Path $currentPath)) {
            Write-Error "Current pester-count.json missing."
            exit 1
          }
          $current = Get-Content -Path $currentPath -Raw | ConvertFrom-Json
          if ([int]$current.TotalCount -le 0) {
            Write-Error "Current Pester run reports TotalCount=0 (no tests executed). Refusing to upload as baseline."
            exit 1
          }
          # Hardcoded floor (PR #501 baseline: 1637 total / 1597 passed / 0 failed / 40 skipped on Windows).
          # Belt-and-suspenders against slow drift: the dynamic compare below only checks current >= previous-main,
          # which can quietly accept a long downward staircase. The floor is the absolute lower bound
          # below which CI must fail regardless of what the previous main artifact says.
          # Bump these numbers in the same PR that legitimately raises the count; never lower them.
          $MinTotal  = 1637
          $MinPassed = 1597
          if ([int]$current.TotalCount -lt $MinTotal) {
            Write-Error "Pester TotalCount $($current.TotalCount) is below hardcoded floor $MinTotal. If tests were intentionally removed, lower the floor in .github/workflows/ci.yml in the same PR and document the removal."
            exit 1
          }
          if ([int]$current.PassedCount -lt $MinPassed) {
            Write-Error "Pester PassedCount $($current.PassedCount) is below hardcoded floor $MinPassed. New failures or skips have eroded the green floor. Fix the failing tests; do not lower the floor."
            exit 1
          }
          $runs = gh run list --repo $env:GH_REPO --workflow $env:GH_WORKFLOW_FILE --branch main --event push --status success --limit 10 --json databaseId | ConvertFrom-Json
          if (-not $runs -or @($runs).Count -eq 0) {
            Write-Warning "No previous successful main runs found. Skipping baseline comparison."
            exit 0
          }
          $baselineDir = Join-Path (Get-Location) 'baseline'
          if (Test-Path $baselineDir) { Remove-Item -Path $baselineDir -Recurse -Force }
          $downloaded = $false
          foreach ($run in @($runs)) {
            # `gh` is a native binary; non-zero exits don't throw in PowerShell. Reset
            # $LASTEXITCODE so a prior failure can't leak into this iteration, then check
            # both the exit code AND that pester-count.json actually landed before declaring success.
            $global:LASTEXITCODE = 0
            New-Item -ItemType Directory -Path $baselineDir -Force | Out-Null
            gh run download $run.databaseId --repo $env:GH_REPO --name pester-baseline --dir $baselineDir --skip-existing 2>&1 | Out-Null
            if ($LASTEXITCODE -eq 0 -and (Test-Path (Join-Path $baselineDir 'pester-count.json'))) {
              $downloaded = $true
              break
            }
            # Clean partial download before next attempt.
            if (Test-Path $baselineDir) { Remove-Item -Path $baselineDir -Recurse -Force -ErrorAction SilentlyContinue }
          }
          if (-not $downloaded) {
            Write-Warning "No previous pester-baseline artifact found on main across last 10 runs. Skipping baseline comparison."
            exit 0
          }
          $baselinePath = Join-Path $baselineDir 'pester-count.json'
          if (-not (Test-Path $baselinePath)) {
            Write-Warning "Baseline artifact did not include pester-count.json. Skipping."
            exit 0
          }
          $baseline = Get-Content -Path $baselinePath -Raw | ConvertFrom-Json
          if ([int]$baseline.TotalCount -le 0) {
            Write-Warning "Baseline TotalCount<=0 (corrupt or empty). Skipping comparison rather than fail-open."
            exit 0
          }
          if ([int]$current.TotalCount -lt [int]$baseline.TotalCount) {
            Write-Error "Pester TotalCount dropped from $($baseline.TotalCount) to $($current.TotalCount)."
            exit 1
          }
          if ([int]$current.PassedCount -lt [int]$baseline.PassedCount) {
            Write-Error "Pester PassedCount dropped from $($baseline.PassedCount) to $($current.PassedCount)."
            exit 1
          }
          Write-Host "Pester TotalCount check passed. Current=$($current.TotalCount), Baseline=$($baseline.TotalCount)" -ForegroundColor Green

      - name: Upload Pester baseline artifact (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-baseline
          path: output/pester-count.json
          retention-days: 90

  verify-install-manifest:
    name: Verify install manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate install manifest schema
        shell: pwsh
        run: |
          Write-Host "Validating tools/install-manifest.json schema..." -ForegroundColor Yellow
          $manifest = Get-Content tools/install-manifest.json -Raw | ConvertFrom-Json
          
          # Basic schema validation
          if (-not $manifest.schemaVersion) {
            Write-Error "Missing schemaVersion in install-manifest.json"
            exit 1
          }
          
          if (-not $manifest.tools) {
            Write-Error "Missing tools array in install-manifest.json"
            exit 1
          }
          
          foreach ($tool in $manifest.tools) {
            if (-not $tool.name) {
              Write-Error "Tool missing name: $($tool | ConvertTo-Json -Compress)"
              exit 1
            }
            if (-not $tool.version) {
              Write-Error "Tool $($tool.name) missing version"
              exit 1
            }
            if (-not $tool.pinType) {
              Write-Error "Tool $($tool.name) missing pinType"
              exit 1
            }
          }
          
          Write-Host "✓ Install manifest schema valid" -ForegroundColor Green

      - name: Verify SHA-256 implementation
        shell: pwsh
        run: |
          Write-Host "Testing SHA-256 verification functions..." -ForegroundColor Yellow
          
          # Source the installer module
          . ./modules/shared/Installer.ps1
          
          # Create a test file with known content (cross-platform temp path)
          $tempDir = if ($env:TEMP) { $env:TEMP } elseif ($env:TMPDIR) { $env:TMPDIR } else { '/tmp' }
          $testFile = Join-Path $tempDir 'test-hash.txt'
          'test content for hash verification' | Set-Content -Path $testFile -NoNewline
          
          # Compute hash (known SHA-256 of the above string)
          $actualHash = Get-FileHash256 -Path $testFile
          $expectedHash = 'a7c96262c21db9a06fd49e307d694fd29b6e6b58d1f3f6d9f3e6c4e0c7f3f6e9'
          
          Write-Host "Computed hash: $actualHash" -ForegroundColor Cyan
          
          if ($actualHash -notmatch '^[a-f0-9]{64}$') {
            Write-Error "Hash output format invalid: $actualHash"
            exit 1
          }
          
          Remove-Item $testFile
          Write-Host "✓ SHA-256 verification functions working" -ForegroundColor Green

  generate-sbom:
    name: Generate SBOM (dry run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate SBOM
        shell: pwsh
        run: |
          ./tools/Generate-SBOM.ps1 -Verbose
          
          if (-not (Test-Path output/sbom.json)) {
            Write-Error "SBOM generation failed - output/sbom.json not created"
            exit 1
          }
          
          # Validate SBOM structure
          $sbom = Get-Content output/sbom.json -Raw | ConvertFrom-Json
          
          if ($sbom.bomFormat -ne 'CycloneDX') {
            Write-Error "Invalid SBOM format: expected CycloneDX, got $($sbom.bomFormat)"
            exit 1
          }
          
          if ($sbom.specVersion -ne '1.5') {
            Write-Error "Invalid SBOM spec version: expected 1.5, got $($sbom.specVersion)"
            exit 1
          }
          
          if (-not $sbom.metadata.component) {
            Write-Error "SBOM missing metadata.component"
            exit 1
          }
          
          if ($sbom.metadata.component.name -ne 'azure-analyzer') {
            Write-Error "SBOM root component name incorrect"
            exit 1
          }
          
          $componentCount = $sbom.components.Count
          Write-Host "✓ SBOM generated with $componentCount components" -ForegroundColor Green

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: output/sbom.json
          retention-days: 30
