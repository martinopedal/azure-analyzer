name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for manual first-release runs), for example v1.2.3'
        required: true
        type: string
      publish_to_psgallery:
        description: 'Publish to PSGallery after dry run'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release_please:
    name: Release Please (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run release-please (manifest mode)
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          command: manifest
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish release artifacts
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          } else {
            $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag must match v<major>.<minor>.<patch>, got '$tag'"
          }

          $version = $tag -replace '^v', ''
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Validate release tag
        shell: bash
        # GPG-signed / annotated tags are NOT required (#963 / Sage Path A):
        # release-please ships lightweight tags (objecttype = commit), and
        # PSGallery does not require GPG-signed tags. Provenance is established
        # via the SHA256SUMS + SBOM artifacts and the SHA-pinned release pipeline,
        # not via tag signatures. We still verify the tag exists, resolves to a
        # real commit, and matches the v<major>.<minor>.<patch> pattern.
        run: |
          set -euo pipefail
          TAG='${{ steps.version.outputs.tag }}'

          if ! git rev-parse --verify --quiet "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} not found in repository" >&2
            exit 1
          fi

          OBJECT_TYPE="$(git for-each-ref "refs/tags/${TAG}" --format='%(objecttype)')"
          COMMIT_SHA="$(git rev-parse "${TAG}^{commit}")"

          if [[ -z "${COMMIT_SHA}" ]]; then
            echo "Tag ${TAG} does not resolve to a commit" >&2
            exit 1
          fi

          case "${OBJECT_TYPE}" in
            commit) echo "Tag ${TAG} is a lightweight tag at ${COMMIT_SHA} (release-please default)" ;;
            tag)    echo "Tag ${TAG} is an annotated tag at ${COMMIT_SHA}" ;;
            *)      echo "Tag ${TAG} has unexpected object type '${OBJECT_TYPE}'" >&2; exit 1 ;;
          esac

      - name: Install Pester
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: pwsh
          command: |
            # Pester 5.7.1 pin (#851): minimum-version lets Install-Module
            # pull Pester 6.x once stable, which has a different
            # [PesterConfiguration] surface and has been observed returning
            # $null from Invoke-Pester under PassThru. Pin to the same
            # 5.7.1 version the Test matrix uses.
            $pinned = '5.7.1'
            $have = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -eq $pinned }
            if (-not $have) {
              Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -RequiredVersion $pinned
            }

      - name: Pester gate
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1 -Force
          Invoke-Pester -Path ./tests -CI

      - name: Build module package + release zip
        id: package
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $version = '${{ steps.version.outputs.version }}'

          $releaseStagingRoot = Join-Path $PWD 'release-staging'
          $moduleRoot = Join-Path $releaseStagingRoot 'AzureAnalyzer'
          if (Test-Path $releaseStagingRoot) { Remove-Item -Path $releaseStagingRoot -Recurse -Force }
          New-Item -ItemType Directory -Path $moduleRoot -Force | Out-Null

          # PSGallery package allowlist (#963). NOTHING outside this list ships.
          # Repo-internal directories that MUST stay out of the package:
          #   .copilot/, .squad/, .github/, .vscode/, infra/, samples/, tests/,
          #   docs/design/, docs/consumer/, docs/operations/, .release-please-*,
          #   release-please-config.json, plan.md, *.local.*, secrets, fixtures.
          # Adding a new top-level item to ship? Add it below AND add it to the
          # `excluded` list in the "Verify package exclusions" step so the guard
          # stays meaningful.
          $copyPaths = @(
            'AzureAnalyzer.psd1',
            'AzureAnalyzer.psm1',
            'Invoke-AzureAnalyzer.ps1',
            'New-HtmlReport.ps1',
            'New-MdReport.ps1',
            'modules',
            'queries',
            'templates',
            'scripts',
            'tools/tool-manifest.json',
            'LICENSE',
            'CHANGELOG.md',
            'README.md'
          )

          foreach ($path in $copyPaths) {
            $destinationPath = Join-Path $moduleRoot $path
            $destinationParent = Split-Path -Path $destinationPath -Parent
            if (-not (Test-Path $destinationParent)) {
              New-Item -ItemType Directory -Path $destinationParent -Force | Out-Null
            }
            Copy-Item -Path $path -Destination $destinationPath -Recurse -Force
          }

          $outputDir = Join-Path $PWD 'output'
          if (-not (Test-Path $outputDir)) { New-Item -ItemType Directory -Path $outputDir -Force | Out-Null }

          $zipPath = Join-Path $outputDir ("AzureAnalyzer-$tag.zip")
          if (Test-Path $zipPath) { Remove-Item -Path $zipPath -Force }
          Compress-Archive -Path (Join-Path $moduleRoot '*') -DestinationPath $zipPath -CompressionLevel Optimal

          "module_root=$moduleRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify package exclusions (#963)
        shell: pwsh
        run: |
          $moduleRoot = '${{ steps.package.outputs.module_root }}'
          if (-not (Test-Path $moduleRoot)) {
            throw "Staging root missing: $moduleRoot"
          }

          # Defensive guard: even though the package step uses an explicit
          # allowlist, assert the forbidden directories never landed in the
          # staged module. Catches accidental Copy-Item drift, symlinks, or
          # generator bugs that would otherwise leak repo internals into the
          # PSGallery package.
          $excluded = @(
            '.copilot', '.squad', '.github', '.vscode',
            'infra', 'samples', 'tests',
            'docs/design', 'docs/consumer', 'docs/operations',
            '.release-please-manifest.json', 'release-please-config.json',
            'plan.md'
          )

          $leaked = @()
          foreach ($candidate in $excluded) {
            $probe = Join-Path $moduleRoot $candidate
            if (Test-Path $probe) {
              $leaked += $candidate
            }
          }

          if ($leaked.Count -gt 0) {
            $list = ($leaked -join ', ')
            throw "PSGallery package contains forbidden paths: $list. Update the `$copyPaths allowlist in the package step or this guard, then re-run."
          }

          # Also verify every path in `$copyPaths` actually made it into the
          # staging root, so a typo in the package step does not silently ship
          # an empty package.
          $required = @(
            'AzureAnalyzer.psd1',
            'AzureAnalyzer.psm1',
            'Invoke-AzureAnalyzer.ps1',
            'New-HtmlReport.ps1',
            'New-MdReport.ps1',
            'modules',
            'queries',
            'templates',
            'scripts',
            'tools/tool-manifest.json',
            'LICENSE',
            'CHANGELOG.md',
            'README.md'
          )
          $missing = @()
          foreach ($r in $required) {
            if (-not (Test-Path (Join-Path $moduleRoot $r))) {
              $missing += $r
            }
          }
          if ($missing.Count -gt 0) {
            throw "PSGallery package is missing required paths: $($missing -join ', ')"
          }

          Write-Host "Package exclusion guard OK. Staged module contains only the allowlisted paths."

      - name: Generate SBOM
        shell: pwsh
        run: |
          ./tools/Generate-SBOM.ps1 -Verbose
          if (-not (Test-Path output/sbom.json)) {
            throw 'SBOM generation failed: output/sbom.json missing.'
          }

      - name: Generate SHA256SUMS
        id: checksums
        shell: pwsh
        run: |
          $zipPath = '${{ steps.package.outputs.zip_path }}'
          $sbomPath = Join-Path $PWD 'output/sbom.json'
          $sumPath = Join-Path $PWD 'output/SHA256SUMS.txt'

          if (-not (Test-Path $zipPath)) { throw "Zip artifact missing: $zipPath" }
          if (-not (Test-Path $sbomPath)) { throw "SBOM artifact missing: $sbomPath" }

          $zipHash = (Get-FileHash -Algorithm SHA256 -Path $zipPath).Hash.ToLowerInvariant()
          $sbomHash = (Get-FileHash -Algorithm SHA256 -Path $sbomPath).Hash.ToLowerInvariant()

          @(
            "$zipHash  $(Split-Path -Leaf $zipPath)",
            "$sbomHash  $(Split-Path -Leaf $sbomPath)"
          ) | Set-Content -Path $sumPath -Encoding UTF8

          "sum_path=$sumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload release build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.package.outputs.zip_path }}
            output/sbom.json
            ${{ steps.checksums.outputs.sum_path }}
          retention-days: 14

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.zip_path }}
            output/sbom.json
            ${{ steps.checksums.outputs.sum_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PSGallery publish dry run
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: pwsh
          command: |
            if (-not $env:PSGALLERY_API_KEY) {
              throw 'PSGALLERY_API_KEY is required for release publishing.'
            }
            Publish-Module -Path '${{ steps.package.outputs.module_root }}' -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -WhatIf

      - name: PSGallery publish
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.publish_to_psgallery == true) && steps.create_release.outcome == 'success'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        with:
          max_attempts: 3
          timeout_minutes: 10
          retry_wait_seconds: 30
          retry_on: error
          shell: pwsh
          command: |
            Publish-Module -Path '${{ steps.package.outputs.module_root }}' -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery

  # ---------------------------------------------------------------------------
  # Preflight (Windows): probe Pool W-pub for the Windows leg of the
  # psgallery_e2e matrix below. See
  # martinopedal/personal-runners-infra/docs/WINDOWS-PREFLIGHT.md.
  # Runs in parallel with `publish` to avoid serial latency.
  # ---------------------------------------------------------------------------
  preflight-windows:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    uses: martinopedal/personal-runners-infra/.github/workflows/runner-preflight.yml@main
    with:
      os: windows
      desired_label: alz-w-pub
      min_online: 1

  # ---------------------------------------------------------------------------
  # PSGallery post-publish E2E verification (cross-platform matrix)
  # Replaces the former inline smoke step with a full 8-check gate.
  # ---------------------------------------------------------------------------
  psgallery_e2e:
    name: PSGallery E2E (${{ matrix.os }})
    needs: [publish, preflight-windows]
    if: needs.publish.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: >-
      ${{ matrix.os == 'windows-latest'
          && fromJSON(needs.preflight-windows.outputs.runner_label)
          || matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Install module from PSGallery
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 5
          timeout_minutes: 10
          retry_wait_seconds: 60
          retry_on: error
          shell: pwsh
          command: |
            $version = '${{ needs.publish.outputs.version }}'
            $moduleName = 'AzureAnalyzer'

            # Check 1: Install-Module from PSGallery (tolerates indexing lag via retry)
            Write-Host "::group::Check 1 - Install-Module $moduleName $version"
            Find-Module -Name $moduleName -Repository PSGallery -RequiredVersion $version -ErrorAction Stop
            Install-Module -Name $moduleName -RequiredVersion $version -Repository PSGallery -Scope CurrentUser -Force -AllowClobber
            Write-Host "::endgroup::"
            Write-Host "CHECK 1 PASS: Install-Module succeeded"

      - name: Verify module (checks 2-8)
        shell: pwsh
        run: |
          $version = '${{ needs.publish.outputs.version }}'
          $moduleName = 'AzureAnalyzer'
          $failures = @()

          # ------------------------------------------------------------------
          # Check 2: Import-Module
          # ------------------------------------------------------------------
          try {
            Import-Module $moduleName -RequiredVersion $version -Force -ErrorAction Stop
            Write-Host "CHECK 2 PASS: Import-Module succeeded"
          } catch {
            $failures += "CHECK 2 FAIL: Import-Module - $_"
          }

          # ------------------------------------------------------------------
          # Check 3: Get-Command exports match manifest
          # ------------------------------------------------------------------
          $expectedExports = @('Invoke-AzureAnalyzer', 'New-HtmlReport', 'New-MdReport')
          $actualExports = @((Get-Command -Module $moduleName).Name | Sort-Object)
          $missing = $expectedExports | Where-Object { $_ -notin $actualExports }
          if ($missing.Count -eq 0) {
            Write-Host "CHECK 3 PASS: All expected exports present ($($expectedExports -join ', '))"
          } else {
            $failures += "CHECK 3 FAIL: Missing exports: $($missing -join ', ')"
          }

          # ------------------------------------------------------------------
          # Check 4: Loaded module version matches published version
          # ------------------------------------------------------------------
          $mod = Get-Module $moduleName
          if ($mod -and $mod.Version.ToString() -eq $version) {
            Write-Host "CHECK 4 PASS: Version matches ($version)"
          } else {
            $got = if ($mod) { $mod.Version.ToString() } else { '(not loaded)' }
            $failures += "CHECK 4 FAIL: Version mismatch. Expected $version, got $got"
          }

          # ------------------------------------------------------------------
          # Check 5: PSGallery manifest fields are populated
          # ------------------------------------------------------------------
          $gallery = Find-Module -Name $moduleName -RequiredVersion $version -Repository PSGallery
          $fieldChecks = [ordered]@{
            Author       = $gallery.Author
            Description  = $gallery.Description
            LicenseUri   = "$($gallery.LicenseUri)"
            ProjectUri   = "$($gallery.ProjectUri)"
            Tags         = "$($gallery.Tags)"
          }
          $emptyFields = @($fieldChecks.GetEnumerator() | Where-Object { -not $_.Value })
          if ($emptyFields.Count -eq 0) {
            Write-Host "CHECK 5 PASS: All PSGallery manifest fields present"
          } else {
            $failures += "CHECK 5 FAIL: Empty manifest fields: $($emptyFields.Name -join ', ')"
          }

          # ------------------------------------------------------------------
          # Check 6: ReleaseNotes URI references the repository
          # ------------------------------------------------------------------
          $releaseNotes = "$($gallery.ReleaseNotes)"
          if ($releaseNotes -match 'azure-analyzer') {
            Write-Host "CHECK 6 PASS: ReleaseNotes URI references repository"
          } else {
            $failures += "CHECK 6 FAIL: ReleaseNotes does not reference repository: $releaseNotes"
          }

          # ------------------------------------------------------------------
          # Check 7: Functional smoke via Get-Help (no Azure creds needed)
          # ------------------------------------------------------------------
          try {
            foreach ($fn in $expectedExports) {
              $help = Get-Help $fn -Full -ErrorAction Stop
              if (-not $help) { throw "Get-Help returned null for $fn" }
            }
            Write-Host "CHECK 7 PASS: Get-Help succeeded for all exported functions"
          } catch {
            $failures += "CHECK 7 FAIL: Get-Help - $_"
          }

          # ------------------------------------------------------------------
          # Check 8: PSScriptAnalyzer Error-severity gate
          # ------------------------------------------------------------------
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          }
          $modulePath = (Get-Module $moduleName).ModuleBase
          $psaResults = @(Invoke-ScriptAnalyzer -Path $modulePath -Recurse -Severity Error -ErrorAction SilentlyContinue)
          if ($psaResults.Count -eq 0) {
            Write-Host "CHECK 8 PASS: No PSScriptAnalyzer Error-severity findings"
          } else {
            $failures += "CHECK 8 FAIL: PSScriptAnalyzer found $($psaResults.Count) Error-severity issue(s):"
            foreach ($r in $psaResults) {
              $failures += "  $($r.ScriptName):$($r.Line) [$($r.RuleName)] $($r.Message)"
            }
          }

          # ------------------------------------------------------------------
          # Summary
          # ------------------------------------------------------------------
          Write-Host ""
          Write-Host "========================================="
          if ($failures.Count -eq 0) {
            Write-Host "ALL 8 CHECKS PASSED" -ForegroundColor Green
          } else {
            Write-Host "FAILURES:" -ForegroundColor Red
            foreach ($f in $failures) { Write-Host "  $f" -ForegroundColor Red }
            throw "PSGallery E2E verification failed: $($failures.Count) check(s) failed"
          }
