# Lychee link checker configuration for azure-analyzer.
#
# Hardening history: PR #444 (keda.sh TLS), PR #483 (retries 5 / 10s wait),
# PR #500 (workflow-level retry wrapper), PR #N (this file: caching, transient
# squad-inbox path excludes).

verbose = "info"
no_progress = true
max_concurrency = 8
# Per-request retry policy: stays gentle on third-party hosts so we do not get
# IP-banned for hammering on PR push storms.
max_retries = 5
retry_wait_time = 10
timeout = 30

# Persistent cache lives in .lycheecache; the workflow restores/saves it via
# actions/cache so consecutive runs do not re-probe stable URLs. Drains the
# 429 / rate-limit failure mode that dominates flaky-link reports.
cache = true
max_cache_age = "7d"

accept = ["200..=299", "301", "302", "304", "307", "308", "429"]
include_fragments = false
exclude_loopback = true
include_mail = false

exclude = [
  "^http://",
  "^https://img\\.shields\\.io/",
  "^https://(www\\.)?linkedin\\.com/",
  "^https://x\\.com/",
  "^https://twitter\\.com/",
  # keda.sh has recurring TLS handshake flakiness in GitHub-hosted runners (PR #444 / run 24803238036)
  "^https://keda\\.sh",
  # release-please compare links reference tags that may not exist yet at PR time
  "^https://github\\.com/martinopedal/azure-analyzer/compare/v\\d+\\.\\d+\\.\\d+",
  "^https://github\\.com/martinopedal/azure-analyzer/releases/tag/v\\d+\\.\\d+\\.\\d+",
  # Loopback / placeholder hosts
  "^https?://(localhost|127\\.|0\\.0\\.0\\.0|example\\.(com|org|net))",
  "^file:///.*?/\\.copilot/skills/humanizer/url$",
  "^file:///.*?/\\.squad/templates/skills/humanizer/url$",
  # Temporary: docs restructure in progress - stub pages don't exist yet
  "^file:.*docs/contributing/adding-a-tool\\.md",
  "^file:.*docs/contributing/ai-governance\\.md",
  "^file:.*docs/contributing/CONTRIBUTING\\.md",
  "^file:.*docs/contributing/development\\.md",
  "^file:.*docs/contributing/testing\\.md",
  "^file:.*docs/contributing/troubleshooting\\.md",
  "^file:.*docs/getting-started/installation\\.md",
  "^file:.*docs/getting-started/first-run\\.md",
  "^file:.*docs/getting-started/quickstart-scenarios\\.md",
  "^file:.*docs/guides/running-assessments\\.md",
  "^file:.*docs/guides/interpreting-reports\\.md",
  "^file:.*docs/guides/ai-triage-workflow\\.md",
  "^file:.*docs/guides/cloud-first-targeting\\.md",
  "^file:.*docs/guides/gitleaks-tuning\\.md",
  "^file:.*docs/guides/kubernetes-auth\\.md",
  "^file:.*docs/guides/log-analytics-sink\\.md",
  "^file:.*docs/architecture/overview\\.md",
  "^file:.*docs/architecture/data-flow\\.md",
  "^file:.*docs/architecture/normalizer-contract\\.md",
  "^file:.*docs/architecture/entity-model\\.md",
  "^file:.*docs/architecture/permission-tiers\\.md",
  "^file:.*docs/operators/continuous-control\\.md",
  "^file:.*docs/operators/security-invariants\\.md",
  "^file:.*docs/reference/adding-a-tool\\.md",
  "^file:.*docs/reference/ai-triage\\.md",
  "^file:.*docs/reference/gitleaks-pattern-tuning\\.md",
  "^file:.*docs/reference/k8s-auth\\.md",
  "^file:.*docs/reference/ARCHITECTURE\\.md",
  # Stale links to ephemeral squad-inbox / atlas-stash files (lifetime hours)
  "^file:.*\\.squad/decisions/inbox/.*\\.md$",
  "^file:.*\\.atlas-stash/.*\\.md$",
  "^file:.*\\.copilot/(audits|status|session-state)/.*\\.md$",
]

exclude_path = [
  "(^|/)\\.lychee-bin/",
  "(^|/)\\.copilot/skills/humanizer/SKILL\\.md$",
  "(^|/)\\.squad/templates/skills/humanizer/SKILL\\.md$",
  # Ephemeral squad / agent state: never link-validated.
  "(^|/)\\.squad/decisions/inbox/",
  "(^|/)\\.copilot/audits/",
  "(^|/)\\.copilot/status/",
  "(^|/)\\.copilot/session-state/",
  "(^|/)\\.atlas-stash/",
  "(^|/)output(-[^/]+)?/",
  # Temporary: docs restructure in progress - broken internal links will be fixed in separate PR
  "^docs/README\\.md$",
  "^docs/architecture/README\\.md$",
  "^docs/contributing/README\\.md$",
  "^docs/getting-started/README\\.md$",
  "^docs/guides/README\\.md$",
  "^docs/operators/README\\.md$",
  "^docs/reference/README\\.md$",
]
