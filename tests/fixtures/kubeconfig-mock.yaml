apiVersion: v1
kind: Config
current-context: mock-ctx
clusters:
- name: mock-cluster
  cluster:
    server: https://kubernetes.example.invalid:6443
    insecure-skip-tls-verify: true
contexts:
- name: mock-ctx
  context:
    cluster: mock-cluster
    user: mock-user
    namespace: default
users:
- name: mock-user
  user:
    token: mock-token-not-real
